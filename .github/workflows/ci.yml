name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: ${{ matrix.os }} / check & test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-2022, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: hello-world tick
        run: cargo run -p simulator-cli -- run --scenario scenarios/hello.yaml --ticks 100
      - name: determinism (smoke_100k × 100 ticks)
        run: cargo run -p simulator-cli -- determinism --scenario scenarios/smoke_100k.yaml --ticks 100
      - name: ig2 schema round-trip
        run: cargo run -p simulator-cli -- law-compile --schema

  deny:
    name: cargo-deny
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
